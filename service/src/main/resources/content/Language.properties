com.sohlman.liferay.bfdms.configuration.name=Backup Friendly File Storage
com.sohlman.liferay.bfdms.configuration.root.dir.description=Set the value of the directory for the store. Relative paths will be prepended by the Liferay home directory.
storage-naming-strategy-configuration-name=BFDMS - Storage Naming Strategy Configuration
storage-naming-strategy-configuration-description=Select which naming strategy is used when storing new binaries.
storage-naming-strategy-type-name=Naming Strategy
storage-naming-strategy-type-description=Selects the active naming strategy for new binaries. The default strategy preserves the original behaviour. Warning: Changing this setting while the system is running will cause new files to use a different path structure than existing ones, which can result in data corruption and files becoming inaccessible.
fingerprint-naming-strategy-configuration-name=BFDMS - Fingerprint Naming Strategy Configuration
fingerprint-naming-strategy-configuration-description=Configure folder structure and filename options for the fingerprint naming strategy.
fingerprint-naming-folder-chars-per-level-name=Folder Characters Per Level
fingerprint-naming-folder-chars-per-level-description=Number of characters from the filename used for each folder level. Default is 2.
fingerprint-naming-folder-depth-name=Folder Depth
fingerprint-naming-folder-depth-description=Number of folder levels (1-9). Default is 2.
fingerprint-naming-strip-folder-prefix-name=Strip Folder Prefix From Filename
fingerprint-naming-strip-folder-prefix-description=When enabled, the characters used for folder naming are removed from the stored filename. Default is disabled.

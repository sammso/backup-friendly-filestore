binary-store-cache-configuration-name=BFDMS - Binary Store Cache Configuration
binary-store-cache-configuration-description=Configure the active cache implementation for binary store retrieval.
binary-store-cache-type-name=Cache Type
binary-store-cache-type-description=The cache.type of the BinaryStoreCache implementation to use. Must match a deployed cache module. Default is noop (no caching).
stats-enabled-name=Enable Download Statistics
stats-enabled-description=Enable periodic download statistics reporting. Disabled by default.
stats-report-interval-minutes-name=Stats Report Interval (minutes)
stats-report-interval-minutes-description=How often to log the download statistics report. Default is 60 minutes.
stats-popular-files-max-count-name=Popular Files List Size
stats-popular-files-max-count-description=Maximum number of files in the most-downloaded report. Default is 10.
stats-slowest-files-max-count-name=Slowest Files List Size
stats-slowest-files-max-count-description=Maximum number of files in the slowest-download report. Default is 10.
